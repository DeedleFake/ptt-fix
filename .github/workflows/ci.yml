name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      - name: Test
        run: go test -vet=all ./...

      - name: staticcheck
        run: go tool staticcheck ./...

      - name: modernize
        run: go tool modernize ./...
